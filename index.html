<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS VORTEX</title>
    <style>
        :root { --c: #00f2fe; --p: #4facfe; --bg: #050609; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Cabecera y Núcleo */
        .v { height: 100px; display: flex; justify-content: center; align-items: center; position: relative; }
        .core { width: 35px; height: 35px; background: linear-gradient(135deg, var(--c), var(--p)); border-radius: 50%; box-shadow: 0 0 20px var(--c); z-index: 5; }
        .pulse { position: absolute; width: 35px; height: 35px; border: 1px solid var(--c); border-radius: 50%; animation: pulse 3s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(3.5); opacity: 0; } }

        /* Contenedor de Chat */
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; line-height: 1.4; }
        .jarvis { background: rgba(0,242,254,0.05); border-left: 2px solid var(--c); align-self: flex-start; }
        .user { background: rgba(255,255,255,0.07); align-self: flex-end; }

        /* Área de Entrada AJUSTADA */
        .input-box { 
            padding: 15px; 
            background: #0a0b10; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            border-top: 1px solid rgba(0,242,254,0.1);
        }
        input { 
            flex-grow: 1; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--c); 
            border-radius: 20px; 
            padding: 10px 15px; 
            color: #fff; 
            outline: none; 
        }
        
        /* Botón Enviar para Celular */
        #sendBtn {
            background: var(--c);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px var(--c);
        }
    </style>
</head>
<body>
    <div class="v"><div class="pulse"></div><div class="core"></div></div>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="in" placeholder="Comando..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>

    <script>
        const i = document.getElementById('in');
        const b = document.getElementById('sendBtn');

        function enviar() {
            if (i.value.trim() !== "") {
                const url = new URL(window.parent.location.href);
                url.searchParams.set('chat', i.value);
                window.parent.location.href = url.href;
            }
        }

        // Detectar ENTER en PC y Celular
        i.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                enviar();
            }
        });

        // Detectar CLIC en botón
        b.addEventListener('click', enviar);

        // Auto-scroll y Focus
        window.onload = () => {
            const c = document.getElementById('chat');
            c.scrollTop = c.scrollHeight;
            i.focus();
        };
    </script>
</body>
</html>

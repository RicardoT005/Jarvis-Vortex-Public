<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS OS | VORTEX</title>
    <style>
        :root {
            --bg-deep: #050609;
            --cyan: #00f2fe;
            --purple: #4facfe;
            --vortex-grad: linear-gradient(135deg, var(--cyan), var(--purple));
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .vortex-header {
            height: 140px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }

        .core-center {
            width: 45px;
            height: 45px;
            background: var(--vortex-grad);
            border-radius: 50%;
            box-shadow: 0 0 35px var(--cyan);
            z-index: 5;
        }

        .pulse {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 1.5px solid var(--cyan);
            border-radius: 50%;
            animation: pulse-out 3s infinite ease-out;
        }
        .pulse:nth-child(2) { animation-delay: 1.5s; }

        @keyframes pulse-out {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; border-color: var(--purple); }
        }

        .reactor-monitor {
            width: 92%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px 18px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
        }

        .reactor-item { margin-bottom: 8px; }
        .reactor-label {
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            color: var(--cyan);
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .progress-bar {
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--vortex-grad);
        }

        .chat-container {
            flex-grow: 1;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 25px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .msg {
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            max-width: 88%;
            line-height: 1.5;
        }

        .jarvis { background: rgba(0, 242, 254, 0.05); border-left: 2px solid var(--cyan); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.06); align-self: flex-end; }

        .input-area {
            width: 100%;
            padding: 15px 20px 30px 20px;
            background: linear-gradient(to top, var(--bg-deep) 80%, transparent);
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(0,242,254,0.2);
            border-radius: 30px;
            padding: 14px 24px;
            color: white;
            outline: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="vortex-header">
        <div class="pulse"></div>
        <div class="pulse"></div>
        <div class="core-center"></div>
    </div>

    <div class="reactor-monitor">
        <div class="reactor-item">
            <div class="reactor-label"><span>REACTOR PRINCIPAL</span> <span>ACTIVO</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
        </div>
        <div class="reactor-item">
            <div class="reactor-label"><span>MÓDULO DE DATOS</span> <span>STANDBY</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
        </div>
    </div>

    <div class="chat-container" id="chat">
        </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Esperando órdenes, Ricardo..." autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');

        // Función vital para que Python reciba el mensaje
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const query = encodeURIComponent(input.value);
                // Enviamos el mensaje al cerebro (Python) recargando la vista
                window.parent.location.search = `?chat=${query}`;
            }
        });

        // Auto-scroll al final
        window.onload = () => chat.scrollTop = chat.scrollHeight;
    </script>
</body>
</html>

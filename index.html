<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS OS | VORTEX</title>
    <style>
        :root {
            --bg-deep: #050609;
            --cyan: #00f2fe;
            --purple: #4facfe;
            --vortex-grad: linear-gradient(135deg, var(--cyan), var(--purple));
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita scroll doble en la página principal */
        }

        .vortex-header {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }

        .core-center {
            width: 40px;
            height: 40px;
            background: var(--vortex-grad);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--cyan);
            z-index: 5;
        }

        .pulse {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1.5px solid var(--cyan);
            border-radius: 50%;
            animation: pulse-out 3s infinite ease-out;
        }
        .pulse:nth-child(2) { animation-delay: 1.5s; }

        @keyframes pulse-out {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; border-color: var(--purple); }
        }

        .reactor-monitor {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            margin: 0 auto 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .reactor-label { font-size: 0.6rem; color: var(--cyan); display: flex; justify-content: space-between; margin-bottom: 3px; }
        .progress-bar { height: 2px; background: rgba(255,255,255,0.05); margin-bottom: 5px; }
        .progress-fill { height: 100%; background: var(--vortex-grad); }

        /* EL CHAT AHORA SE AJUSTA AUTOMÁTICAMENTE */
        .chat-container {
            flex-grow: 1; /* Toma todo el espacio disponible */
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px 20px;
            overflow-y: auto; /* Solo esta parte tiene scroll */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg { padding: 12px 16px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; }
        .jarvis { background: rgba(0, 242, 254, 0.05); border-left: 2px solid var(--cyan); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.06); align-self: flex-end; color: #efefef; }

        /* EL INPUT SIEMPRE VISIBLE */
        .input-area {
            width: 100%;
            padding: 15px 20px;
            background: #0d0e14;
            flex-shrink: 0; /* No permite que se encoja */
        }

        input {
            width: 100%;
            max-width: 800px;
            display: block;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,242,254,0.3);
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="vortex-header">
        <div class="pulse"></div>
        <div class="pulse"></div>
        <div class="core-center"></div>
    </div>

    <div class="reactor-monitor">
        <div class="reactor-label"><span>REACTOR VORTEX</span> <span>100%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
    </div>

    <div class="chat-container" id="chat">
        </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escriba a Jarvis..." autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                window.parent.location.search = `?chat=${encodeURIComponent(input.value)}`;
            }
        });

        window.onload = () => { chat.scrollTop = chat.scrollHeight; };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS OS | VORTEX</title>
    <style>
        :root {
            --bg-deep: #050609;
            --cyan: #00f2fe;
            --purple: #4facfe;
            --vortex-grad: linear-gradient(135deg, var(--cyan), var(--purple));
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- NÚCLEO VORTEX --- */
        .vortex-header {
            height: 140px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }

        .core-center {
            width: 45px;
            height: 45px;
            background: var(--vortex-grad);
            border-radius: 50%;
            box-shadow: 0 0 35px var(--cyan);
            z-index: 5;
        }

        .pulse {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 1.5px solid var(--cyan);
            border-radius: 50%;
            animation: pulse-out 3s infinite ease-out;
        }
        .pulse:nth-child(2) { animation-delay: 1.5s; }

        @keyframes pulse-out {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; border-color: var(--purple); }
        }

        /* --- MONITOR DE REACTORES --- */
        .reactor-monitor {
            width: 92%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px 18px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            flex-shrink: 0;
        }

        .reactor-item { margin-bottom: 8px; }
        .reactor-label {
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            color: var(--cyan);
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .progress-bar {
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--vortex-grad);
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CONTENEDOR DE CHAT (VACÍO AL INICIO) --- */
        .chat-container {
            flex-grow: 1;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 25px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scrollbar-width: none; /* Ocultar scroll en Firefox */
        }
        .chat-container::-webkit-scrollbar { display: none; } /* Ocultar en Chrome/Safari */

        .msg {
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            max-width: 88%;
            line-height: 1.5;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .jarvis { 
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.05), rgba(79, 172, 254, 0.05)); 
            border-left: 2px solid var(--cyan); 
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user { 
            background: rgba(255, 255, 255, 0.06); 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
            color: #efefef;
        }

        /* --- ENTRADA --- */
        .input-area {
            width: 100%;
            padding: 15px 20px 30px 20px;
            background: linear-gradient(to top, var(--bg-deep) 80%, transparent);
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(0,242,254,0.2);
            border-radius: 30px;
            padding: 14px 24px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--cyan);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
        }

        @media (max-width: 600px) {
            .vortex-header { height: 110px; }
            .msg { font-size: 0.9rem; max-width: 92%; }
            .reactor-monitor { padding: 10px 14px; }
        }
    </style>
</head>
<body>

    <div class="vortex-header">
        <div class="pulse"></div>
        <div class="pulse"></div>
        <div class="core-center"></div>
    </div>

    <div class="reactor-monitor">
        <div class="reactor-item">
            <div class="reactor-label"><span>REACTOR PRINCIPAL</span> <span id="val1">100k</span></div>
            <div class="progress-bar"><div class="progress-fill" id="bar1" style="width: 100%;"></div></div>
        </div>
        <div class="reactor-item">
            <div class="reactor-label"><span>MÓDULO DE DATOS</span> <span id="val2">100k</span></div>
            <div class="progress-bar"><div class="progress-fill" id="bar2" style="width: 100%;"></div></div>
        </div>
        <div class="reactor-item">
            <div class="reactor-label"><span>NÚCLEO EMERGENCIA</span> <span id="val3">100k</span></div>
            <div class="progress-bar"><div class="progress-fill" id="bar3" style="width: 100%;"></div></div>
        </div>
    </div>

    <div class="chat-container" id="chat">
        </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Esperando órdenes, Ricardo..." autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `<strong>${role === 'user' ? 'RICARDO' : 'JARVIS'}:</strong> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value;
                addMessage('user', text);
                input.value = "";
                
                // Simulación de respuesta de Jarvis
                setTimeout(() => {
                    addMessage('jarvis', "Núcleo Vortex activo. Procesando tu solicitud, Ricardo...");
                }, 1000);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS VORTEX</title>
    <style>
        :root { --c: #00f2fe; --bg: #050609; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Núcleo Vortex */
        .v { height: 70px; display: flex; justify-content: center; align-items: center; position: relative; }
        .core { width: 30px; height: 30px; background: var(--c); border-radius: 50%; box-shadow: 0 0 15px var(--c); }
        .pulse { position: absolute; width: 30px; height: 30px; border: 1px solid var(--c); border-radius: 50%; animation: p 2s infinite; }
        @keyframes p { 0% { scale: 1; opacity: 0.8; } 100% { scale: 4; opacity: 0; } }

        /* Chat */
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; }
        .jarvis { background: rgba(0,242,254,0.05); border-left: 2px solid var(--c); align-self: flex-start; }
        .user { background: rgba(255,255,255,0.07); align-self: flex-end; }

        /* Input y Botón */
        .input-box { padding: 10px; background: #0a0b10; display: flex; gap: 8px; border-top: 1px solid rgba(0,242,254,0.1); }
        input { flex-grow: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--c); border-radius: 20px; padding: 12px; color: #fff; outline: none; }
        #btn { background: var(--c); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: #000; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="v"><div class="pulse"></div><div class="core"></div></div>
    <div id="chat">
        {{CHAT}}
    </div>
    <div class="input-box">
        <input type="text" id="in" placeholder="Escriba a Jarvis..." autocomplete="off">
        <button id="btn">➤</button>
    </div>

    <script>
        const i = document.getElementById('in');
        const b = document.getElementById('btn');
        const c = document.getElementById('chat');

        function enviar() {
            const t = i.value.trim();
            if (t !== "") {
                b.innerHTML = "⌛";
                i.disabled = true;
                // ESTA LÍNEA ES LA CLAVE: Envía el dato al 'padre' (Streamlit)
                const url = new URL(window.top.location.href);
                url.searchParams.set('chat', t);
                window.top.location.href = url.toString();
            }
        }

        i.addEventListener('keydown', (e) => { if (e.key === 'Enter') enviar(); });
        b.addEventListener('click', enviar);

        window.onload = () => { 
            c.scrollTop = c.scrollHeight; 
            i.focus();
        };
    </script>
</body>
</html>
